name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Explorer ${{ github.ref_name }}"
          releaseBody: "See the [commit log](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for details."
          releaseDraft: false
          prerelease: false

      # The Cargo package is named `explorer-app`, so the raw binary is
      # explorer-app.exe (intentional — `taskkill /IM` would otherwise match
      # the Windows shell explorer.exe). WebView2Loader.dll is the small
      # (~150KB) loader shipped by webview2-com-sys; the WebView2 runtime
      # itself is expected to be system-installed (default on Win11).
      - name: Package portable bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path explorer-portable -Force | Out-Null
          Copy-Item src-tauri/target/release/explorer-app.exe explorer-portable/
          Copy-Item src-tauri/target/release/WebView2Loader.dll explorer-portable/
          Compress-Archive -Path explorer-portable/* -DestinationPath explorer-portable.zip -Force

      - name: Upload portable bundle to release
        uses: softprops/action-gh-release@v2
        with:
          files: explorer-portable.zip
          tag_name: ${{ github.ref_name }}
